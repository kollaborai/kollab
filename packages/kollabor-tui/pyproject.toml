[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kollabor-tui"
version = "1.0.1"
description = "Terminal UI primitives for Kollabor: design system, key parsing, terminal state, visual effects"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "kollabor-events>=1.0.1",
]

[tool.hatch.build.targets.wheel]
packages = ["src/kollabor_tui"]
