[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kollabor-tui"
version = "0.5.16"
description = "Terminal UI primitives for Kollabor: design system, key parsing, terminal state, visual effects"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "kollabor-events>=0.5.15",
]

[tool.hatch.build.targets.wheel]
packages = ["src/kollabor_tui"]
