[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kollabor-plugins"
version = "0.5.11"
description = "Plugin infrastructure for Kollabor"
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "kollabor-events>=0.5.11",
]

[tool.hatch.build.targets.wheel]
packages = ["src/kollabor_plugins"]
