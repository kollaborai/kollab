[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kollabor-config"
version = "0.5.9"
description = "Configuration management for Kollabor"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
dependencies = [
    "kollabor-events>=0.5.9",
]

[tool.hatch.build.targets.wheel]
packages = ["src/kollabor_config"]
