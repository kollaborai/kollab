[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kollabor-ai"
version = "0.5.11"
description = "LLM provider API for Kollabor"
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "pydantic>=2.0.0",
    "aiohttp>=3.10.11",
    "httpx>=0.27.0",
    "openai>=1.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/kollabor_ai"]
