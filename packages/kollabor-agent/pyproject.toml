[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kollabor-agent"
version = "0.5.16"
description = "Agent execution toolkit - tool execution, MCP integration, file operations, and shell commands"
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "kollabor-events>=0.5.15",
    "kollabor-config>=0.5.15",
    "kollabor-ai>=0.5.15",
    "pyyaml>=6.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/kollabor_agent"]
