[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kollabor-webui"
version = "0.5.7"
description = "Web UI for Kollab Engine"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
dependencies = [
    "kollabor-engine>=0.5.7",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/kollabor_webui"]

[tool.uv.sources]
kollabor-engine = { workspace = true }

[project.scripts]
kollabor-webui = "kollabor_webui:main"
