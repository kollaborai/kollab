name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install build tools
        run: uv pip install --system build twine

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update all package versions
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          echo "Setting all packages to version $VERSION"

          # Root pyproject.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml

          # Sub-packages
          for pkg in packages/*/pyproject.toml; do
            sed -i "s/^version = \".*\"/version = \"$VERSION\"/" "$pkg"
          done

          # Update inter-package dep constraints
          for pkg in packages/*/pyproject.toml pyproject.toml; do
            sed -i "s/\"kollabor-events>=.*\"/\"kollabor-events>=$VERSION\"/" "$pkg"
            sed -i "s/\"kollabor-config>=.*\"/\"kollabor-config>=$VERSION\"/" "$pkg"
            sed -i "s/\"kollabor-ai>=.*\"/\"kollabor-ai>=$VERSION\"/" "$pkg"
            sed -i "s/\"kollabor-agent>=.*\"/\"kollabor-agent>=$VERSION\"/" "$pkg"
            sed -i "s/\"kollabor-plugins>=.*\"/\"kollabor-plugins>=$VERSION\"/" "$pkg"
            sed -i "s/\"kollabor-rpc>=.*\"/\"kollabor-rpc>=$VERSION\"/" "$pkg"
            sed -i "s/\"kollabor-tui>=.*\"/\"kollabor-tui>=$VERSION\"/" "$pkg"
            sed -i "s/\"kollabor-engine>=.*\"/\"kollabor-engine>=$VERSION\"/" "$pkg"
            sed -i "s/\"kollabor-webui>=.*\"/\"kollabor-webui>=$VERSION\"/" "$pkg"
          done

      - name: Build and publish sub-packages
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          PACKAGES=(
            kollabor-events
            kollabor-ai
            kollabor-rpc
            kollabor-config
            kollabor-plugins
            kollabor-tui
            kollabor-agent
            kollabor-engine
            kollabor-webui
          )
          for pkg in "${PACKAGES[@]}"; do
            echo "=== Publishing $pkg ==="
            uv build --out-dir "packages/$pkg/dist" --package "$pkg"
            twine upload "packages/$pkg/dist/"*
          done

      - name: Build and publish root package
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          echo "=== Publishing kollab ==="
          uv build --out-dir dist --package kollab
          twine upload dist/*

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          # Publish a GitHub Release for this tag. The in-app update check
          # (VersionCheckService) queries /releases/latest, so without a
          # Release the notification never fires even though PyPI has the new
          # version. Idempotent: skip if the Release already exists.
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "Release v$VERSION already exists; skipping."
          else
            gh release create "v$VERSION" \
              --title "v$VERSION" \
              --generate-notes \
              --verify-tag \
              || echo "::warning::GitHub Release creation failed for v$VERSION"
          fi

      - name: Commit version bump
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml packages/*/pyproject.toml uv.lock
          if git diff --cached --quiet; then
            echo "Versions already match the release tag; nothing to commit."
          else
            git commit -m "Release v$VERSION"
            # main is protected, so a bot push may be rejected. Don't fail the
            # release over it -- the artifacts are built from the tag, and a hard
            # failure here would skip the Homebrew dispatch step below.
            git push origin HEAD:main \
              || echo "::warning::version-bump push rejected (protected branch); skipping"
          fi

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN is not configured; cannot update Homebrew tap" >&2
            exit 1
          fi
          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${HOMEBREW_TAP_TOKEN}" \
            https://api.github.com/repos/kollaborai/homebrew-tap/dispatches \
            -d "{\"event_type\":\"pypi-release\",\"client_payload\":{\"version\":\"${VERSION}\"}}"
