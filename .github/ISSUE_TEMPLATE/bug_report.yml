name: Bug report
description: Report a reproducible problem in Kollab.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please avoid posting API keys, OAuth tokens, raw cookies, or private conversation logs.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the smallest command sequence or workflow that triggers the issue.
      placeholder: |
        1. Run `kollab ...`
        2. Use `/hub ...`
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Kollab version
      placeholder: "kollab --version"
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "macOS 14, zsh, iTerm2, Python 3.12"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Redact secrets and private paths before sharing.

